- name: Discover namespaces
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Get namespace list
      command: ip netns list
      register: ns_list

    - name: Add namespaces as local-exec hosts
      add_host:
        name: "{{ item | regex_replace(' .*', '') }}"
        groups: netns
        ansible_connection: local
        ansible_python_interpreter: /usr/bin/python3
      loop: "{{ ns_list.stdout_lines }}"

- name: Execute in namespaces in parallel
  hosts: netns
  gather_facts: no
  strategy: free

  tasks:
    - name: Ping from namespace
      become: yes
      command: ip netns exec {{ inventory_hostname }} ping -c 1 -W 1 10.10.0.1

- name: Start Paxos node
  become: yes
  command: >
    ip netns exec {{ inventory_hostname }}
    /usr/bin/python3 paxos_node.py
    --node {{ inventory_hostname }}
  async: 3600
  poll: 0
