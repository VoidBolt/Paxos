- name: Ping every lab machine
  hosts: pool
  gather_facts: false

  tasks:
    - name: Ping every other host
      command: >
        ping -c1 -W1 {{ hostvars[item].ansible_host }}
      loop: "{{ groups['pool'] }}"
      register: results
      ignore_errors: true

    - debug:
        msg: >
          {{ inventory_hostname }}
          -> {{ hostvars[item.item].ansible_host }}
          {{ 'OK' if item.rc == 0 else 'FAILED' }}
      loop: "{{ results.results }}"
